name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ThatCode ${{ github.ref_name }}
          releaseBody: |
            ## ThatCode v2.7.1

            Local coding agent for Windows — repo agent on your machine. Bring your own API.

            ### Install

            - **NSIS** — `ThatCode_2.7.1_x64-setup.exe`
            - **MSI** — `ThatCode_2.7.1_x64_en-US.msi`
            - **Portable** — `ThatCode_2.7.1_x64-portable.zip`

            ### Verify downloads

            Compare your file to **`SHA256.txt`** (attached). See [docs/TRUST.md](https://github.com/${{ github.repository }}/blob/main/docs/TRUST.md).

            ### VirusTotal (maintainer scans)

            - [NSIS .exe](https://www.virustotal.com/gui/file/26754bc38d74085603d7ab2799c9c1336a19e1cae5936d6f926e045cf14be4ed?nocache=1) — 2 heuristic flags (unsigned app)
            - [MSI](https://www.virustotal.com/gui/file/62881009afcfe2e1b1ac661117999b5a684b2e0eb653db61dda6fbc0bfdc65dd?nocache=1) — clean
            - [Portable zip](https://www.virustotal.com/gui/file/499f0c9b29199420424021cf2569258fdd965bb15624ac1413773335a2d791fb?nocache=1) — 1 ML heuristic

            **Trusted source:** [GitHub Releases](https://github.com/${{ github.repository }}/releases) only.

            Full notes: [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          releaseDraft: true
          prerelease: false

      - name: Generate SHA256 manifest
        shell: pwsh
        run: |
          ./scripts/generate-sha256.ps1 `
            -FolderPath src-tauri/target/release/bundle `
            -OutputPath SHA256.txt

      - name: Upload SHA256.txt to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" SHA256.txt --clobber

  build-macos:
    name: Build (macOS)
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build macOS bundle (unsigned)
        run: npm run tauri build -- --bundles dmg
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          BUNDLE="src-tauri/target/release/bundle"
          shopt -s nullglob
          assets=("$BUNDLE/dmg"/*.dmg "$BUNDLE/macos"/*.app.tar.gz)
          if [ ${#assets[@]} -eq 0 ]; then
            find "$BUNDLE" -type f 2>/dev/null || true
            exit 1
          fi
          gh release upload "$TAG" "${assets[@]}" --clobber

  build-linux:
    name: Build (Linux)
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - run: npm ci

      - name: Build Linux bundles
        run: npm run tauri build -- --bundles deb,appimage
        env:
          CI: true

      - name: Upload Linux artifacts to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          BUNDLE="src-tauri/target/release/bundle"
          shopt -s nullglob
          assets=("$BUNDLE/deb"/*.deb "$BUNDLE/appimage"/*.AppImage)
          if [ ${#assets[@]} -eq 0 ]; then
            find "$BUNDLE" -type f 2>/dev/null || true
            exit 1
          fi
          gh release upload "$TAG" "${assets[@]}" --clobber
